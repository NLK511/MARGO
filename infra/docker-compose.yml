services:
  postgres:
    image: postgres:16-alpine
    container_name: margo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: margo
      POSTGRES_PASSWORD: margo
      POSTGRES_DB: margo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U margo -d margo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: margo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    image: margo-worker:local
    container_name: margo-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://margo:margo@postgres:5432/margo?schema=public
      REDIS_URL: redis://redis:6379
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-log}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-MARGO <no-reply@margo.local>}
      NOTIFICATION_WORKER_INTERVAL_MS: ${NOTIFICATION_WORKER_INTERVAL_MS:-5000}
      NOTIFICATION_WORKER_BATCH_SIZE: ${NOTIFICATION_WORKER_BATCH_SIZE:-20}
    depends_on:
      - postgres
      - redis

volumes:
  postgres-data:
