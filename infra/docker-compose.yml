services:
  postgres:
    image: postgres:16-alpine
    container_name: margo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: margo
      POSTGRES_PASSWORD: margo
      POSTGRES_DB: margo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U margo -d margo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: margo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
